theme: osuny
_merge: deep
services:
  rss:
    limit: 100
params:
  summary:
    position: hero
  search:
    active: true

  # Design system
  logo:
    header: '/assets/images/logo.png'
    footer: '/assets/images/logo.png'
  breadcrumb:
    extendable: false
    position: hero-start # hero-start | hero-end | after-hero | after-hero-title | none
  search:
    active: false
    positions:
      - primary
      # - upper-menu
      # - fixed
      # - footer
  home:
    head:
      title: site

  # PAR DEFAUT
  default:
    index:
      taxonomies:
        display: true
        layout: dropdown # dropdown | inline
        show_name: true
    single:
      taxonomies:
        position: content
        show_name: true
    sitemap:
      ignore_children: false
  categories:
    index:
      layout: grid # alternate | cards | grid | large | list
      options:
        image: true
        summary: true
    single:
      taxonomies:
        display: false
  projects:
    index:
      layout: grid # alternate | grid | large | list
      options:
        categories: true
        image: true
        subtitle: true
        summary: true
        year: true
    toc:
      disabled: true
    share_links: # Optional
      enabled: false
    toc:
      disabled: true

  # BLOCKS
  blocks:
    image_sizes:
    _default:
      carousel:
        mobile:   360
        tablet:   555
        desktop:  575